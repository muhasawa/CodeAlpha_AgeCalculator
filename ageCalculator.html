<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<header class="container2">
    <div class="box1">
        <h1>Age Calculator</h1>
    </div>
    <div class="box2">
        <img class="branding" src="muhasawalogo.png" alt="logo">
    </div>
    
    <div class="box3"></div>
</header>

<main>
<div class="slider-container">
    <div class="sliding-text">
        Get your exact age in seconds!
    </div>
</div>

    <div class="container">
        <div class="centered">
            <div class="dob">
                <h2>Date of Birth</h2>
                <select id="dob-year"><option value="">Year</option></select>    
                <select id="dob-month"><option value="">Month</option></select>
                <select id="dob-day"><option value="">Day</option></select>
            </div>
            
            <div class="aad">
                <h2>Age at Date</h2>
                <select id="aad-year"><option value="">Year</option></select>    
                <select id="aad-month"><option value="">Month</option></select>
                <select id="aad-day"><option value="">Day</option></select>
            </div>
        </div>

        <div id="result">Select a full date to calculate age</div>
    </div>
</main>

<div class="container3">
    <div class="box1"></div>
    <div class="box2f">
            Project by Muhammad Hasnain for CodeAlpha | CA/SE3/11704
    </div>
    <div class="box3"></div>
</div>

<script src="script.js"></script>
</body>
</html>
